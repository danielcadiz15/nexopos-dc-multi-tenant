  <text x="95" y="250" font-family="Arial, sans-serif" font-size="18" fill="#0f172a" font-weight="700">Mensajes clave que convierten:</text>
  <text x="95" y="280" font-family="Arial, sans-serif" font-size="17" fill="#334155">- "Con NexoPOS vendes hoy y controlas mejor desde el primer dia."</text>
  <text x="95" y="307" font-family="Arial, sans-serif" font-size="17" fill="#334155">- "No solo cobras: entiendes costos, margenes y rentabilidad real."</text>
  <text x="95" y="334" font-family="Arial, sans-serif" font-size="17" fill="#334155">- "Caja Android + Admin web: operacion simple y control profesional."</text>
  <text x="95" y="370" font-family="Arial, sans-serif" font-size="17" fill="#334155">CTA sugerida: activar demo 48 hs y agendar acompanamiento de puesta en marcha.</text>
