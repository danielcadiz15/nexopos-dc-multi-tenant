  <text x="738" y="160" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" font-weight="700">Min 9-12</text>
  <text x="738" y="182" font-family="Arial, sans-serif" font-size="14" fill="#e0e7ff">Reportes y control</text>

  <rect x="930" y="130" width="180" height="70" rx="12" fill="#312e81"/>
