  <line x1="270" y1="165" x2="300" y2="165" stroke="#334155" stroke-width="3"/>
  <polygon points="300,165 290,160 290,170" fill="#334155"/>
  <line x1="480" y1="165" x2="510" y2="165" stroke="#334155" stroke-width="3"/>
